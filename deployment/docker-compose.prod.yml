services:
  postgres:
    image: postgres:16-alpine
    container_name: hunterlite-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hunterlite}
      POSTGRES_USER: ${POSTGRES_USER:-hunterlite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hunterlite} -d ${POSTGRES_DB:-hunterlite}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    container_name: hunterlite-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-hunterlite}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hunterlite}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://hunterlite.example.com}
      AUTH_DEMO_FALLBACK: "false"
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-hunterlite_session}
      HUNTERLITE_CSRF_SECRET: ${HUNTERLITE_CSRF_SECRET:?HUNTERLITE_CSRF_SECRET is required}
      NAVI_API_KEY: ${NAVI_API_KEY:?NAVI_API_KEY is required}
      NAVI_BASE_URL: ${NAVI_BASE_URL:-https://api.navy}
      NAVI_CHAT_MODEL: ${NAVI_CHAT_MODEL:-gemini-3.5-flash}
      NAVI_TTS_MODEL: ${NAVI_TTS_MODEL:-eleven_flash_v2_5}
      NAVI_TTS_VOICE: ${NAVI_TTS_VOICE:-aria}
      NAVI_STT_MODEL: ${NAVI_STT_MODEL:-scribe_v2}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.web
    container_name: hunterlite-web-prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  postgres_data:
