services:
  postgres:
    image: postgres:16-alpine
    container_name: hunterlite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hunterlite
      POSTGRES_USER: hunterlite
      POSTGRES_PASSWORD: hunterlite
    ports:
      - "5432:5432"
    volumes:
      - hunterlite_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hunterlite -d hunterlite"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hunterlite_postgres_data:
