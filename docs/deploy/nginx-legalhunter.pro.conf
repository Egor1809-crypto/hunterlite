# legalhunter.pro — HunterLite reverse proxy (host nginx).
# Routing split (single public domain):
#   /api/chat*, /api/tts*  → web (Next.js own API routes)   :3300
#   /api/*, /ws/*          → api (FastAPI + websockets)      :8300
#   everything else        → web (Next.js pages)             :3300
#
# Name-based vhost — does NOT use default_server, so other tenants on this
# host (agentum/aspb/expertum/...) are untouched. certbot --nginx will add
# the 443 server block + HTTP→HTTPS redirect in place.
server {
    server_name legalhunter.pro www.legalhunter.pro;

    # Audio uploads (voice training) + generous LLM timeouts.
    client_max_body_size 25M;

    # Next.js-native API routes stay on the web app.
    location ^~ /api/chat {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ^~ /api/tts {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # FastAPI backend.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSockets (voice call / training) → FastAPI.
    location ^~ /ws/ {
        proxy_pass http://127.0.0.1:8300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else → Next.js.
    location / {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/legalhunter.pro/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/legalhunter.pro/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    if ($host = www.legalhunter.pro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = legalhunter.pro) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name legalhunter.pro www.legalhunter.pro;
    return 404; # managed by Certbot




}